<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sales Pitch Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center py-12 px-4">

    <div class="max-w-2xl w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center mb-2">🎙️ AI Sales Pitch Coach</h1>
        <p class="text-slate-400 text-center mb-8">Upload your pitch and get instant psychological analysis and audio
            feedback.</p>

        <script>
            // Example: "https://ai-sales-pitch-analyzer-abcd.onrender.com"
            const API_BASE_URL = "https://ai-sales-pitch-analyzer.onrender.com"; // <--- CHANGE THIS LINE!
        </script>

        <div class="space-y-6">
            <div
                class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center hover:border-blue-500 transition-colors">
                <input type="file" id="audioInput" accept="audio/*" class="hidden" onchange="updateFileName()">
                <label for="audioInput" class="cursor-pointer block">
                    <span class="text-5xl block mb-4">📁</span>
                    <span id="uploadText" class="text-lg font-medium text-blue-400">Click to upload audio</span>
                    <p class="text-sm text-slate-500 mt-2">MP3, M4A, or WAV (Max 10MB)</p>
                    <p id="fileNameDisplay" class="mt-4 text-md font-bold text-green-400 hidden"></p>
                </label>
            </div>

            <button onclick="analyzePitch()" id="analyzeBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                Analyze Pitch 🚀
            </button>
        </div>

        <div id="results" class="mt-10 hidden space-y-6">
            <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-700">
                <h3 class="text-blue-400 font-bold mb-2 uppercase text-xs tracking-widest">Transcript</h3>
                <p id="transcriptText" class="text-slate-300 leading-relaxed"></p>
            </div>

            <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-700">
                <h3 class="text-green-400 font-bold mb-2 uppercase text-xs tracking-widest">AI Coaching Feedback</h3>
                <p id="feedbackText" class="text-slate-300 leading-relaxed italic"></p>
                <div class="mt-4 pt-4 border-t border-slate-800">
                    <p class="text-xs text-slate-500 mb-2">Listen to your Coach:</p>
                    <audio id="audioFeedback" controls class="w-full h-8"></audio>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden text-center mt-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
            <p class="text-slate-500 mt-2">Coach is listening... This may take a minute on the free tier.</p>
        </div>
    </div>

    <script>
        function updateFileName() {
            const fileInput = document.getElementById('audioInput');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const uploadText = document.getElementById('uploadText');

            if (fileInput.files.length > 0) {
                const fileName = fileInput.files[0].name;
                fileNameDisplay.innerText = "✅ Selected: " + fileName;
                fileNameDisplay.classList.remove('hidden');
                uploadText.innerText = "Change file";
            }
        }

        async function analyzePitch() {
            const fileInput = document.getElementById('audioInput');
            const btn = document.getElementById('analyzeBtn');
            const results = document.getElementById('results');
            const loading = document.getElementById('loading');

            if (!fileInput.files[0]) {
                alert("Please select an audio file first!");
                return;
            }

            loading.classList.remove('hidden');
            results.classList.add('hidden');
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                // Formatting the URL properly
                const url = API_BASE_URL.endsWith('/') ? `${API_BASE_URL}analyze-pitch` : `${API_BASE_URL}/analyze-pitch`;

                const response = await fetch(url, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server Error: ${response.status} - ${errorText}`);
                }

                const data = await response.json();

                document.getElementById('transcriptText').innerText = data.transcript;
                document.getElementById('feedbackText').innerText = data.feedback;

                const audioPlayer = document.getElementById('audioFeedback');
                const audioUrl = API_BASE_URL.endsWith('/') ? `${API_BASE_URL}${data.audio_path.substring(1)}` : `${API_BASE_URL}${data.audio_path}`;
                audioPlayer.src = audioUrl;

                results.classList.remove('hidden');
            } catch (error) {
                alert("Error connecting to server. Make sure your Render backend is Live. Details: " + error.message);
                console.error(error);
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
